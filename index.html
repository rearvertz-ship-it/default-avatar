<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fancy Text Generator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    textarea {
      width: 100%;
      height: 100px;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 1rem;
      resize: none;
      outline: none;
      margin-bottom: 20px;
    }

    .output {
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      font-size: 1.8rem;
      margin-bottom: 20px;
      word-break: break-word;
    }

    button {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
    }

    button:hover {
      background: #7c3aed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fancy Text Generator</h1>

    <textarea id="inputText" placeholder="Schreibe deinen Text hier...">LevelUP</textarea>

    <div class="output" id="output">𝐋𝐞𝐯𝐞𝐥𝐔𝐏</div>

    <button onclick="generateFancyText()">Text Umwandeln</button>
    <button onclick="copyText()">Copy</button>
  </div>

  <script>
    const boldMap = {
      a: '𝐚', b: '𝐛', c: '𝐜', d: '𝐝', e: '𝐞',
      f: '𝐟', g: '𝐠', h: '𝐡', i: '𝐢', j: '𝐣',
      k: '𝐤', l: '𝐥', m: '𝐦', n: '𝐧', o: '𝐨',
      p: '𝐩', q: '𝐪', r: '𝐫', s: '𝐬', t: '𝐭',
      u: '𝐮', v: '𝐯', w: '𝐰', x: '𝐱', y: '𝐲', z: '𝐳',
      A: '𝐀', B: '𝐁', C: '𝐂', D: '𝐃', E: '𝐄',
      F: '𝐅', G: '𝐆', H: '𝐇', I: '𝐈', J: '𝐉',
      K: '𝐊', L: '𝐋', M: '𝐌', N: '𝐍', O: '𝐎',
      P: '𝐏', Q: '𝐐', R: '𝐑', S: '𝐒', T: '𝐓',
      U: '𝐔', V: '𝐕', W: '𝐖', X: '𝐗', Y: '𝐘', Z: '𝐙'
    };

    function generateFancyText() {
      const input = document.getElementById('inputText').value;
      let fancy = '';

      for (let char of input) {
        fancy += boldMap[char] || char;
      }

      document.getElementById('output').innerText = fancy;
    }

    function copyText() {
      const text = document.getElementById('output').innerText;
      navigator.clipboard.writeText(text);
      alert('Text kopiert: ' + text);
    }
  </script>
</body>
</html>
